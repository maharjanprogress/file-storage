services:
  file-storage:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: file-storage
    ports:
      - "9000:9000"
    environment:
      FILE_SERVER_URL: "${FILE_SERVER_URL:-http://localhost:9000}"
      FILE_SERVER_API_KEY: "${FILE_SERVER_API_KEY}"
      SERVER_PORT: "9000"
    volumes:
      - /opt/jobcircle:/opt/jobcircle
    restart: unless-stopped
